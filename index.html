<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BP Motor Control</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
        }
        
        .login-box {
            background: #16213e;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        .login-box h2 {
            margin-bottom: 5px;
            font-size: 22px;
        }
        
        .login-box p {
            color: #999;
            font-size: 13px;
            margin-bottom: 25px;
        }
        
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 15px;
        }
        
        .login-box input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .login-box button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        
        .login-box button:hover {
            background: #5a6fd6;
        }
        
        .login-box button:disabled {
            background: #444;
            cursor: not-allowed;
        }
        
        .error-msg {
            color: #f44336;
            background: rgba(244,67,54,0.1);
            padding: 10px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 14px;
            display: none;
        }
        
        .error-msg.show {
            display: block;
        }
        
        .success-msg {
            color: #4CAF50;
            margin-top: 12px;
            font-size: 14px;
        }
        
        .info-text {
            color: #666;
            font-size: 11px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>🔐 FH Motor Control</h2>
        <p>Sign in to access control panel</p>
        
        <input type="email" id="email" placeholder="Email address" autocomplete="email">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">
        
        <button id="loginBtn">Sign In</button>
        
        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>
        
        <p class="info-text">Authorized access only</p>
    </div>
