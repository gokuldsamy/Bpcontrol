<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a1a">
    <title>BP Motor Panel</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdU0803CwzkKBIC9VTFBT6X29xhOeUi3g",
            authDomain: "bp-motor-panel.firebaseapp.com",
            databaseURL: "https://bp-motor-panel-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "bp-motor-panel",
            storageBucket: "bp-motor-panel.firebasestorage.app",
            messagingSenderId: "186220670912",
            appId: "1:186220670912:web:212992e82056da7a31e225"
        };

        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app); window.db = getDatabase(app);
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.onAuthStateChanged = onAuthStateChanged; window.signOut = signOut;
        window.ref = ref; window.set = set; window.onValue = onValue;
        window.query = query; window.limitToLast = limitToLast;
        window.dispatchEvent(new Event('firebase-ready'));
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; max-width: 100vw; overflow-x: hidden; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0a1a; min-height: 100dvh;
            display: flex; justify-content: center; align-items: flex-start;
            color: white; padding: 0;
        }
        .page { display: none; width: 100%; padding: 8px; }
        .page.active { display: block; }
        
        .login-box { background: #16213e; padding: 28px 16px; border-radius: 14px; text-align: center; margin-top: 20px; width: 100%; }
        .login-box h2 { font-size: 20px; margin-bottom: 4px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-box .subtitle { color: #888; font-size: 11px; margin-bottom: 18px; }
        .login-box input { width: 100%; padding: 11px; margin: 4px 0; background: rgba(255,255,255,0.06); border: 1px solid #333; border-radius: 7px; color: white; font-size: 14px; }
        .login-box input:focus { border-color: #667eea; outline: none; }
        .login-box button { width: 100%; padding: 13px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 7px; color: white; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; }
        .login-box button:disabled { opacity: 0.6; }
        .error-msg { color: #f44336; margin-top: 6px; font-size: 11px; display: none; padding: 6px; background: rgba(244,67,54,0.1); border-radius: 5px; }
        .error-msg.show { display: block; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .top-bar h2 { font-size: 16px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-sm { padding: 5px 9px; border: none; border-radius: 5px; font-size: 10px; cursor: pointer; color: white; font-weight: 600; margin-left: 2px; }
        .btn-logs { background: #9C27B0; }
        .btn-logout { background: rgba(244,67,54,0.2); border: 1px solid #f44336; color: #f44336; }
        .btn-back { background: rgba(255,255,255,0.06); border: 1px solid #444; color: #ccc; font-size: 11px; padding: 7px; border-radius: 7px; cursor: pointer; margin-bottom: 6px; width: 100%; }
        
        .card { background: #16213e; padding: 12px 10px; border-radius: 14px; width: 100%; }
        .user-info { color: #888; font-size: 10px; margin-bottom: 4px; text-align: center; }
        
        .alive-banner { padding: 6px 10px; border-radius: 6px; margin-bottom: 6px; text-align: center; font-size: 10px; font-weight: 600; display: none; }
        .alive-banner.show { display: block; }
        .alive-banner.off { background: rgba(244,67,54,0.2); color: #f44336; border: 1px solid rgba(244,67,54,0.4); }
        .alive-banner.warn { background: rgba(255,152,0,0.2); color: #FF9800; border: 1px solid rgba(255,152,0,0.4); }
        .alive-banner.ok { background: rgba(76,175,80,0.2); color: #4CAF50; border: 1px solid rgba(76,175,80,0.4); }
        
        .motor-box { background: #0f3460; border-radius: 12px; padding: 14px 10px; margin: 6px 0; text-align: center; border: 2px solid #f44336; transition: all 0.4s; }
        .motor-box.running { border-color: #4CAF50; box-shadow: 0 0 25px rgba(76,175,80,0.3); }
        .motor-box .motor-icon { font-size: 28px; margin-bottom: 2px; }
        .motor-box.running .motor-icon { color: #4CAF50; }
        .motor-box:not(.running) .motor-icon { color: #f44336; }
        .motor-box .motor-state { font-size: 20px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .motor-box.running .motor-state { color: #4CAF50; }
        .motor-box:not(.running) .motor-state { color: #f44336; }
        .motor-box .motor-info { font-size: 9px; color: #999; margin-top: 1px; }
        .motor-box .motor-relay { font-size: 8px; margin-top: 4px; padding: 2px 8px; border-radius: 10px; display: inline-block; font-weight: 700; }
        .motor-box.running .motor-relay { background: rgba(76,175,80,0.25); color: #66bb6a; }
        .motor-box:not(.running) .motor-relay { background: rgba(244,67,54,0.25); color: #ef5350; }
        
        /* Timer Display below relay */
        .timer-preview {
            font-size: 10px; color: #ffd54f; margin-top: 4px; font-weight: 700;
            display: none; letter-spacing: 1px;
        }
        .timer-preview.show { display: block; }
        .timer-countdown-running {
            font-size: 16px; color: #ffd54f; margin-top: 4px; font-weight: 700;
            display: none; letter-spacing: 2px;
        }
        .timer-countdown-running.show { display: block; }
        
        .btn-row { display: flex; gap: 10px; justify-content: center; margin: 8px 0; }
        .btn { flex: 1; max-width: 140px; padding: 12px 16px; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; color: white; }
        .btn:active { transform: scale(0.95); }
        .btn-start { background: #4CAF50; }
        .btn-start:disabled { background: #2a3a2a; opacity: 0.5; }
        .btn-stop { background: #f44336; }
        
        .status-row { display: flex; gap: 5px; margin: 6px 0; }
        .status-card { flex: 1; background: #0f3460; padding: 8px 4px; border-radius: 8px; text-align: center; }
        .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 2px; }
        .dot.green { background: #4CAF50; }
        .dot.red { background: #f44336; }
        .dot.gray { background: #666; }
        .status-card .label { color: #999; font-size: 7px; display: block; text-transform: uppercase; letter-spacing: 1px; }
        .status-card .value { color: white; font-weight: 700; font-size: 10px; }
        
        .timer-section { background: #0f3460; border-radius: 10px; padding: 10px; margin: 6px 0; text-align: center; }
        .timer-title { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #999; margin-bottom: 6px; }
        .timer-inputs { display: flex; gap: 6px; margin-bottom: 6px; }
        .timer-group { flex: 1; }
        .timer-group label { display: block; font-size: 7px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
        .timer-group input { width: 100%; padding: 8px; background: rgba(0,0,0,0.3); border: 1px solid #333; border-radius: 6px; color: white; font-size: 16px; font-weight: 700; text-align: center; }
        .timer-group input:focus { border-color: #667eea; outline: none; }
        .btn-timer { width: 100%; padding: 8px; background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 6px; color: white; font-size: 11px; font-weight: 700; cursor: pointer; letter-spacing: 1px; }
        .btn-timer-clear { width: 100%; padding: 6px; background: transparent; border: 1px solid #f44336; border-radius: 6px; color: #f44336; font-size: 10px; cursor: pointer; margin-top: 4px; }
        
        .stats-row { display: flex; gap: 5px; margin: 6px 0; }
        .stat-card { flex: 1; background: #0f3460; padding: 8px 5px; border-radius: 8px; text-align: center; }
        .stat-card .stat-value { font-size: 16px; font-weight: 700; color: #2196F3; }
        .stat-card .stat-label { font-size: 7px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
        
        .history-section { background: #0f3460; border-radius: 8px; padding: 8px; margin-top: 6px; }
        .history-title { font-size: 8px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #999; margin-bottom: 5px; text-align: center; }
        .history-list { max-height: 90px; overflow-y: auto; }
        .history-item { display: flex; align-items: center; padding: 5px 6px; margin: 1px 0; background: rgba(0,0,0,0.3); border-radius: 5px; font-size: 9px; border-left: 2px solid #555; }
        .history-item.push-button { border-left-color: #FF9800; }
        .history-item.web-dashboard { border-left-color: #2196F3; }
        .history-icon { font-size: 14px; margin-right: 5px; font-weight: 700; }
        .history-details { flex: 1; }
        .history-action { font-weight: 700; font-size: 10px; }
        .history-action.on { color: #4CAF50; }
        .history-action.off { color: #f44336; }
        .source-badge { display: inline-block; padding: 1px 4px; border-radius: 2px; font-size: 7px; font-weight: 700; margin-top: 1px; }
        .source-badge.push { background: rgba(255,152,0,0.2); color: #FF9800; }
        .source-badge.web { background: rgba(33,150,243,0.2); color: #2196F3; }
        .source-badge.timer { background: rgba(156,39,176,0.2); color: #9C27B0; }
        .history-time { font-size: 7px; color: #777; white-space: nowrap; }
        .history-empty { text-align: center; color: #666; padding: 10px; font-size: 10px; }
        
        .shell-box { background: #0a0a0a; border-radius: 6px; border: 1px solid #333; overflow: hidden; margin-bottom: 6px; }
        .shell-header { display: flex; justify-content: space-between; align-items: center; padding: 5px 8px; background: #1a1a1a; border-bottom: 1px solid #333; font-size: 9px; color: #aaa; font-weight: 600; }
        .btn-clear { padding: 2px 5px; background: rgba(244,67,54,0.2); border: 1px solid #f44336; color: #f44336; border-radius: 3px; font-size: 7px; cursor: pointer; }
        .shell-content { padding: 5px; max-height: 160px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 8px; line-height: 1.2; color: #ccc; }
        .log-line { padding: 0; border-bottom: 1px solid rgba(255,255,255,0.02); display: flex; gap: 4px; }
        .log-time { color: #555; white-space: nowrap; font-size: 7px; min-width: 50px; }
        .log-msg { word-break: break-all; }
        .log-empty { text-align: center; color: #555; padding: 12px; font-size: 9px; }
        
        .footer-text { color: #555; font-size: 7px; margin-top: 5px; text-align: center; }
        .toast { position: fixed; top: 8px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 6px 14px; border-radius: 6px; font-size: 11px; z-index: 9999; display: none; }
        .toast.show { display: block; }
    </style>
</head>
<body>

    <div class="toast" id="toast"></div>

    <div class="page active" id="loginPage">
        <div class="login-box">
            <h2>BP Motor Panel</h2>
            <p class="subtitle">Sign in to access control panel</p>
            <input type="email" id="emailInput" placeholder="Email address">
            <input type="password" id="passwordInput" placeholder="Password">
            <button id="loginBtn" onclick="doLogin()">Sign In</button>
            <div class="error-msg" id="loginError"></div>
        </div>
    </div>

    <div class="page" id="dashboardPage">
        <div class="top-bar">
            <h2>BP Motor Panel</h2>
            <div>
                <button class="btn-sm btn-logs" onclick="showPage('logsPage')">Logs</button>
                <button class="btn-sm btn-logout" onclick="doLogout()">Exit</button>
            </div>
        </div>
        <div class="card">
            <div class="user-info" id="userInfo">Welcome</div>
            <div class="alive-banner" id="aliveBanner"></div>
            
            <div class="motor-box" id="motorBox">
                <div class="motor-icon" id="motorIcon">MOTOR</div>
                <div class="motor-state" id="motorState">STOPPED</div>
                <div class="motor-info" id="motorSource"></div>
                <div class="motor-relay" id="motorRelay">Relay 2 (NC)</div>
                <!-- Timer preview (shown after setting timer) -->
                <div class="timer-preview" id="timerPreview"></div>
                <!-- Timer countdown (shown after START + relay active) -->
                <div class="timer-countdown-running" id="timerCountdownRunning"></div>
            </div>
            
            <div class="btn-row">
                <button class="btn btn-start" id="startBtn" onclick="startMotor()">START</button>
                <button class="btn btn-stop" onclick="stopMotor()">STOP</button>
            </div>
            
            <div class="status-row">
                <div class="status-card"><span class="dot gray" id="masterDot"></span><span class="label">Master</span><span class="value" id="masterStatus">--</span></div>
                <div class="status-card"><span class="dot gray" id="loraDot"></span><span class="label">LoRa</span><span class="value" id="loraStatus">--</span></div>
                <div class="status-card"><span class="dot gray" id="slaveDot"></span><span class="label">Slave</span><span class="value" id="slaveStatus">--</span></div>
            </div>
            
            <div class="timer-section">
                <div class="timer-title">Set Timer (optional)</div>
                <div class="timer-inputs">
                    <div class="timer-group"><label>Hours</label><input type="number" id="hrs" placeholder="0" min="0" max="23" value="0"></div>
                    <div class="timer-group"><label>Minutes</label><input type="number" id="mins" placeholder="0" min="0" max="59" value="0"></div>
                </div>
                <button class="btn-timer" onclick="setTimerValue()">Confirm Timer</button>
                <button class="btn-timer-clear" onclick="clearTimerValue()">Clear Timer</button>
            </div>
            
            <div class="stats-row">
                <div class="stat-card"><div class="stat-value" id="statPings">0</div><div class="stat-label">Pings</div></div>
                <div class="stat-card"><div class="stat-value" id="statMissed">0</div><div class="stat-label">Missed</div></div>
                <div class="stat-card"><div class="stat-value" id="statRestarts">0</div><div class="stat-label">Restarts</div></div>
                <div class="stat-card"><div class="stat-value" id="statUptime">0</div><div class="stat-label">Uptime</div></div>
            </div>
            
            <div class="history-section">
                <div class="history-title">History</div>
                <div class="history-list" id="historyList"><div class="history-empty">Waiting...</div></div>
            </div>
        </div>
        <div class="footer-text" id="footerText">BP Motor Panel</div>
    </div>

    <div class="page" id="logsPage">
        <div class="top-bar">
            <h2>Shell Logs</h2>
            <button class="btn-sm btn-logs" onclick="showPage('dashboardPage')">Home</button>
        </div>
        <div class="card">
            <button class="btn-back" onclick="showPage('dashboardPage')">Back to Dashboard</button>
            <div class="shell-box">
                <div class="shell-header"><span>Master Shell</span><button class="btn-clear" onclick="clearLogs('master_logs')">Clear</button></div>
                <div class="shell-content" id="masterContent"><div class="log-empty">Waiting...</div></div>
            </div>
            <div class="shell-box">
                <div class="shell-header"><span>Slave Shell</span><button class="btn-clear" onclick="clearLogs('slave_logs')">Clear</button></div>
                <div class="shell-content" id="slaveContent"><div class="log-empty">Waiting...</div></div>
            </div>
        </div>
        <div class="footer-text">BP Motor Panel</div>
    </div>

    <script>
        let motorRunning = false, motorHistory = [], timerInterval = null;
        let pendingTimerMinutes = 0, timerActive = false;
        const OFFLINE_TIMEOUT = 30;
        
        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function clearLogs(path) { window.set(window.ref(window.db, path), null); }
        
        window.addEventListener('firebase-ready', function() {
            const auth = window.auth, db = window.db;
            window.onAuthStateChanged(auth, function(user) {
                if (user) { showPage('dashboardPage'); document.getElementById('userInfo').textContent = user.email; setupListeners(); loadHistory(); loadShellLogs(); }
                else { showPage('loginPage'); }
            });
            window.doLogin = function() {
                const email = document.getElementById('emailInput').value.trim(), password = document.getElementById('passwordInput').value;
                const err = document.getElementById('loginError'); err.classList.remove('show');
                if (!email || !password) { err.textContent = 'Enter email and password'; err.classList.add('show'); return; }
                const btn = document.getElementById('loginBtn'); btn.disabled = true; btn.textContent = 'Signing in...';
                window.signInWithEmailAndPassword(auth, email, password).then(()=>{}).catch(error => { err.textContent = error.message; err.classList.add('show'); btn.disabled = false; btn.textContent = 'Sign In'; });
            };
            window.doLogout = function() { window.signOut(auth); showPage('loginPage'); };
            
            let cmdId = 0;
            
            // Set timer value (does NOT start motor)
            window.setTimerValue = function() {
                const h = parseInt(document.getElementById('hrs').value) || 0;
                const m = parseInt(document.getElementById('mins').value) || 0;
                const total = h * 60 + m;
                if (total <= 0) { showToast('Set hours or minutes'); return; }
                if (total > 1440) { showToast('Max 24 hours'); return; }
                
                pendingTimerMinutes = total;
                document.getElementById('timerPreview').textContent = 'Timer: ' + h + 'h ' + m + 'm';
                document.getElementById('timerPreview').classList.add('show');
                document.getElementById('hrs').value = 0;
                document.getElementById('mins').value = 0;
                showToast('Timer set: ' + h + 'h ' + m + 'm - Press START to begin');
            };
            
            // Clear timer value
            window.clearTimerValue = function() {
                pendingTimerMinutes = 0;
                timerActive = false;
                document.getElementById('timerPreview').classList.remove('show');
                document.getElementById('timerCountdownRunning').classList.remove('show');
                document.getElementById('hrs').value = 0;
                document.getElementById('mins').value = 0;
                if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
                showToast('Timer cleared');
            };
            
            // START button - sends ON or ON+timer
            window.startMotor = function() {
                cmdId++;
                if (pendingTimerMinutes > 0) {
                    // Send timer command
                    window.set(window.ref(db, 'motor_control'), {
                        command: 'timer',
                        command_id: cmdId,
                        timestamp: Date.now(),
                        source: 'web_dashboard',
                        minutes: pendingTimerMinutes
                    });
                    timerActive = true;
                    showToast('Starting with timer...');
                } else {
                    // Normal start
                    window.set(window.ref(db, 'motor_control'), {
                        command: 'on',
                        command_id: cmdId,
                        timestamp: Date.now(),
                        source: 'web_dashboard'
                    });
                    showToast('Starting...');
                }
            };
            
            // STOP button
            window.stopMotor = function() {
                cmdId++;
                pendingTimerMinutes = 0;
                timerActive = false;
                document.getElementById('timerPreview').classList.remove('show');
                document.getElementById('timerCountdownRunning').classList.remove('show');
                if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
                window.set(window.ref(db, 'motor_control'), {
                    command: 'off',
                    command_id: cmdId,
                    timestamp: Date.now(),
                    source: 'web_dashboard'
                });
                showToast('Stopping...');
            };
            
            function setupListeners() {
                window.onValue(window.ref(db, 'system_status'), function(snap) {
                    const d = snap.val();
                    if (d) {
                        const now = Date.now();
                        const lastUpdate = d.last_update || 0;
                        const secondsSinceUpdate = (now - lastUpdate) / 1000;
                        const isMasterAlive = secondsSinceUpdate < OFFLINE_TIMEOUT;
                        const masterOnline = d.wifi_connected && isMasterAlive;
                        const loraConnected = d.slave_online && isMasterAlive;
                        const slaveOnline = masterOnline && loraConnected;
                        
                        updateMasterCard(masterOnline);
                        updateLoraCard(loraConnected);
                        updateSlaveCard(slaveOnline);
                        updateMotorBox(d.motor_running, d.trigger_source);
                        updateBanner(masterOnline, loraConnected, slaveOnline, secondsSinceUpdate);
                        
                        document.getElementById('statPings').textContent = (d.lora_ping_count || 0).toLocaleString();
                        document.getElementById('statMissed').textContent = d.lora_missed || 0;
                        
                        // Show countdown when timer is active and motor is running
                        if (d.timer_active && d.motor_running && d.timer_seconds > 0) {
                            updateTimerCountdown(true, d.timer_seconds);
                        }
                        
                        document.getElementById('footerText').textContent = 'Last update: ' + formatSecondsAgo(secondsSinceUpdate);
                    } else {
                        updateMasterCard(false); updateLoraCard(false); updateSlaveCard(false);
                        updateBanner(false, false, false, 999);
                    }
                });
                
                window.onValue(window.ref(db, 'timer'), function(snap) {
                    const d = snap.val();
                    if (d && d.active && d.remaining_seconds > 0 && motorRunning) {
                        updateTimerCountdown(true, d.remaining_seconds);
                    } else if (!d || !d.active) {
                        updateTimerCountdown(false, 0);
                        pendingTimerMinutes = 0;
                        document.getElementById('timerPreview').classList.remove('show');
                    }
                });
                
                window.onValue(window.ref(db, 'slave_details'), function(snap) {
                    const d = snap.val();
                    if (d) {
                        document.getElementById('statRestarts').textContent = d.restart_count || 0;
                        document.getElementById('statUptime').textContent = formatUptime(d.uptime || 0);
                    }
                });
            }
            
            // Show HH:MM:SS countdown in motor box
            function updateTimerCountdown(active, secs) {
                const el = document.getElementById('timerCountdownRunning');
                const preview = document.getElementById('timerPreview');
                
                if (active && secs > 0) {
                    el.textContent = formatCountdown(secs);
                    el.classList.add('show');
                    preview.classList.remove('show');
                    
                    if (timerInterval) clearInterval(timerInterval);
                    let remaining = secs;
                    timerInterval = setInterval(() => {
                        remaining--;
                        if (remaining <= 0) {
                            clearInterval(timerInterval);
                            el.classList.remove('show');
                            pendingTimerMinutes = 0;
                            timerActive = false;
                        } else {
                            el.textContent = formatCountdown(remaining);
                        }
                    }, 1000);
                } else {
                    el.classList.remove('show');
                    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
                }
            }
            
            function formatCountdown(s) {
                const h = Math.floor(s / 3600);
                const m = Math.floor((s % 3600) / 60);
                const sec = s % 60;
                return h.toString().padStart(2, '0') + ':' + m.toString().padStart(2, '0') + ':' + sec.toString().padStart(2, '0');
            }
            
            function updateBanner(masterOk, loraOk, slaveOk, secondsAgo) {
                const b = document.getElementById('aliveBanner');
                if (!masterOk && !slaveOk) { b.textContent = 'Devices Offline - ' + formatSecondsAgo(secondsAgo); b.className = 'alive-banner off show'; }
                else if (masterOk && !loraOk) { b.textContent = 'Master Online - LoRa Off'; b.className = 'alive-banner warn show'; }
                else if (masterOk && loraOk && slaveOk) { b.textContent = 'All Systems Online'; b.className = 'alive-banner ok show'; }
                else { b.className = 'alive-banner'; }
            }
            
            function formatSecondsAgo(s) { if(s<5)return'Just now'; if(s<60)return Math.floor(s)+'s ago'; if(s<3600)return Math.floor(s/60)+'m ago'; return Math.floor(s/3600)+'h ago'; }
            function formatUptime(s) { if(s<60)return s+'s'; if(s<3600)return Math.floor(s/60)+'m'; return Math.floor(s/3600)+'h'; }
            
            function updateMasterCard(online) { document.getElementById('masterDot').className='dot '+(online?'green':'red'); document.getElementById('masterStatus').textContent=online?'Online':'Offline'; }
            function updateLoraCard(connected) { document.getElementById('loraDot').className='dot '+(connected?'green':'red'); document.getElementById('loraStatus').textContent=connected?'Connected':'Off'; }
            function updateSlaveCard(online) { document.getElementById('slaveDot').className='dot '+(online?'green':'red'); document.getElementById('slaveStatus').textContent=online?'Online':'Offline'; }
            function updateMotorBox(running, source) {
                const box = document.getElementById('motorBox'), btn = document.getElementById('startBtn');
                motorRunning = running;
                if (running) { box.className='motor-box running'; document.getElementById('motorIcon').textContent='RUNNING'; document.getElementById('motorState').textContent='ON'; document.getElementById('motorSource').textContent='By: '+getSrc(source); document.getElementById('motorRelay').textContent='Relay 1 (NO)'; if(btn)btn.disabled=true; }
                else { box.className='motor-box'; document.getElementById('motorIcon').textContent='MOTOR'; document.getElementById('motorState').textContent='STOPPED'; document.getElementById('motorSource').textContent=source?'By: '+getSrc(source):''; document.getElementById('motorRelay').textContent='Relay 2 (NC)'; if(btn)btn.disabled=false; }
            }
            
            function loadHistory(){window.onValue(window.query(window.ref(db,'motor_history'),window.limitToLast(5)),function(snap){const d=snap.val();if(d){motorHistory=Object.values(d).sort((a,b)=>b.timestamp-a.timestamp).slice(0,5);renderHistory();}});}
            function renderHistory(){const list=document.getElementById('historyList');if(!motorHistory.length){list.innerHTML='<div class="history-empty">No events</div>';return;}let h='';motorHistory.forEach(e=>{const isOn=e.action==='on';h+='<div class="history-item '+(e.source==='push_button'?'push-button':e.source==='web_dashboard'?'web-dashboard':'')+'"><div class="history-icon">'+(isOn?'ON':'OFF')+'</div><div class="history-details"><div class="history-action '+(isOn?'on':'off')+'">'+(isOn?'MOTOR ON':'MOTOR OFF')+'</div><span class="source-badge '+(e.source==='push_button'?'push':e.source==='web_dashboard'?'web':'timer')+'">'+getSrc(e.source)+'</span></div><div class="history-time">'+formatTime(e.timestamp)+'</div></div>';});list.innerHTML=h;}
            
            function loadShellLogs(){window.onValue(window.query(window.ref(db,'master_logs'),window.limitToLast(30)),function(snap){const d=snap.val();document.getElementById('masterContent').innerHTML=d?renderLogs(Object.values(d).sort((a,b)=>b.time-a.time)):'<div class="log-empty">No logs</div>';});window.onValue(window.query(window.ref(db,'slave_logs'),window.limitToLast(30)),function(snap){const d=snap.val();document.getElementById('slaveContent').innerHTML=d?renderLogs(Object.values(d).sort((a,b)=>b.time-a.time)):'<div class="log-empty">No logs</div>';});}
            function renderLogs(logs){let h='';logs.forEach(l=>{const t=formatLogTime(l.time);h+='<div class="log-line"><span class="log-time">'+t+'</span><span class="log-msg">'+(l.msg||l.message||'')+'</span></div>';});return h||'<div class="log-empty">No logs</div>';}
            function formatLogTime(ts){if(!ts||ts<1e12)return'--:--';const d=new Date(ts);if(isNaN(d.getTime()))return'--:--';return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});}
            function getSrc(s){const m={push_button:'Button',web_dashboard:'Web',timer:'Timer',timer_complete:'Timer'};return m[s]||s||'System';}
            function formatTime(ts){if(!ts||ts<1e12)return'--';const d=new Date(ts);if(isNaN(d.getTime()))return'--';const n=new Date(),df=n-d;const ds=d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});const ts2=d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});if(df<6e4)return'Now';if(df<36e5)return Math.floor(df/6e4)+'m';if(df<864e5)return ts2;return ds+' '+ts2;}
        });
        function showToast(m){const t=document.getElementById('toast');if(t){t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}}
        document.addEventListener('keypress',function(e){if(e.key==='Enter'&&document.getElementById('loginPage').classList.contains('active'))doLogin();});
    </script>
</body>
</html>
